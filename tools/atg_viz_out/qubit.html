<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><title>ATG — qubit</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
 body{font-family:system-ui,Segoe UI,Arial;margin:0;background:#fafafa}
 #hdr{padding:10px 16px;background:#263238;color:#fff}
 #hdr b{font-size:18px} #hdr span{opacity:.8;font-size:13px;margin-left:10px}
 #net{width:100vw;height:calc(100vh - 110px);border-top:1px solid #ccc}
 #legend{padding:6px 16px;font-size:12px;background:#eceff1}
 .chip{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;margin-right:6px}
</style></head><body>
<div id="hdr"><b>ATG — qubit</b>
 <span>5 nodes · 3 edges · 18 invariants — kéo để di chuyển, lăn chuột để zoom, rê chuột vào cạnh để xem guard</span></div>
<div id="legend">
 <span class="chip" style="background:#4f86c6">contract</span>
 <span class="chip" style="background:#e8a33d">user/eoa</span>
 <span class="chip" style="background:#7d5ba6">relay</span>
 <span class="chip" style="background:#3aa66f">token</span>
 <span class="chip" style="background:#2e7d32">lock/mint</span>
 <span class="chip" style="background:#b71c1c">withdraw/burn</span>
</div>
<div id="net"></div>
<script>
 const nodes=new vis.DataSet([{"id": "MockToken", "label": "MockToken", "group": "destination", "color": "#4f86c6", "title": "MockToken\\ntype: contract\\nchain: destination"}, {"id": "User", "label": "User", "group": "offchain", "color": "#90a4ae", "title": "User\\ntype: actor\\nchain: offchain"}, {"id": "QBridgeBSC", "label": "QBridgeBSC", "group": "destination", "color": "#90a4ae", "title": "QBridgeBSC\\ntype: router\\nchain: destination"}, {"id": "OffchainRelay", "label": "OffchainRelay", "group": "offchain", "color": "#7d5ba6", "title": "OffchainRelay\\ntype: relay\\nchain: offchain"}, {"id": "QBridgeETH", "label": "QBridgeETH", "group": "source", "color": "#90a4ae", "title": "QBridgeETH\\ntype: router\\nchain: source"}]);
 const edges=new vis.DataSet([{"from": "MockToken", "to": "User", "label": "mint", "color": "#1565c0", "title": "label: mint\\nfn: mint(address,uint256)\\ntoken: MockToken", "arrows": "to"}, {"from": "MockToken", "to": "User", "label": "mint", "color": "#1565c0", "title": "label: mint\\nfn: process(address,uint256,uint64)\\ntoken: xQubit\\nguard: require(!processed[nonce_])", "arrows": "to"}, {"from": "User", "to": "QBridgeETH", "label": "lock", "color": "#2e7d32", "title": "label: lock\\nfn: deposit(address,uint256,address)\\ntoken: 0x0000000000000000000000000000000000000000", "arrows": "to"}]);
 new vis.Network(document.getElementById('net'),{nodes,edges},{
   nodes:{shape:'box',font:{color:'#fff',size:14},margin:8,borderWidth:0},
   edges:{font:{size:12,align:'middle',background:'#fff'},smooth:{type:'cubicBezier'}},
   physics:{stabilization:true,barnesHut:{springLength:160}},
   layout:{improvedLayout:true}
 });
</script></body></html>
