<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><title>ATG — harmony</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
 body{font-family:system-ui,Segoe UI,Arial;margin:0;background:#fafafa}
 #hdr{padding:10px 16px;background:#263238;color:#fff}
 #hdr b{font-size:18px} #hdr span{opacity:.8;font-size:13px;margin-left:10px}
 #net{width:100vw;height:calc(100vh - 110px);border-top:1px solid #ccc}
 #legend{padding:6px 16px;font-size:12px;background:#eceff1}
 .chip{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;margin-right:6px}
</style></head><body>
<div id="hdr"><b>ATG — harmony</b>
 <span>7 nodes · 7 edges · 19 invariants — kéo để di chuyển, lăn chuột để zoom, rê chuột vào cạnh để xem guard</span></div>
<div id="legend">
 <span class="chip" style="background:#4f86c6">contract</span>
 <span class="chip" style="background:#e8a33d">user/eoa</span>
 <span class="chip" style="background:#7d5ba6">relay</span>
 <span class="chip" style="background:#3aa66f">token</span>
 <span class="chip" style="background:#2e7d32">lock/mint</span>
 <span class="chip" style="background:#b71c1c">withdraw/burn</span>
</div>
<div id="net"></div>
<script>
 const nodes=new vis.DataSet([{"id": "EthBucket", "label": "EthBucket", "group": "source", "color": "#4f86c6", "title": "EthBucket\\ntype: contract\\nchain: source"}, {"id": "WrappedToken", "label": "WrappedToken", "group": "source", "color": "#3aa66f", "title": "WrappedToken\\ntype: token\\nchain: source"}, {"id": "Manager", "label": "Manager", "group": "source", "color": "#90a4ae", "title": "Manager\\ntype: actor\\nchain: source"}, {"id": "User", "label": "User", "group": "source", "color": "#90a4ae", "title": "User\\ntype: actor\\nchain: source"}, {"id": "HorizonEthManager", "label": "HorizonEthManager", "group": "source", "color": "#4f86c6", "title": "HorizonEthManager\\ntype: contract\\nchain: source"}, {"id": "MockMultisig", "label": "MockMultisig", "group": "source", "color": "#4f86c6", "title": "MockMultisig\\ntype: contract\\nchain: source"}, {"id": "Token", "label": "Token", "group": "source", "color": "#3aa66f", "title": "Token\\ntype: token\\nchain: source"}]);
 const edges=new vis.DataSet([{"from": "User", "to": "EthBucket", "label": "lock", "color": "#2e7d32", "title": "label: lock\\nfn: deposit(address,address,uint256)\\ntoken: WrappedToken\\nguard: msg.sender == manager", "arrows": "to"}, {"from": "EthBucket", "to": "User", "label": "unlock", "color": "#2e7d32", "title": "label: unlock\\nfn: release(address,address,uint256)\\ntoken: WrappedToken\\nguard: msg.sender == manager ; totalLocked[token] >= amount", "arrows": "to"}, {"from": "User", "to": "EthBucket", "label": "deposit", "color": "#2e7d32", "title": "label: deposit\\nfn: lock(address,uint256)\\ntoken: token\\nguard: bucket.deposit called", "arrows": "to"}, {"from": "EthBucket", "to": "User", "label": "release", "color": "#78909c", "title": "label: release\\nfn: unlock(address,address,uint256)\\ntoken: token\\nguard: msg.sender == address(this) (only via multisig) ; bucket.onlyManager guard", "arrows": "to"}, {"from": "WrappedToken", "to": "User", "label": "mint", "color": "#1565c0", "title": "label: mint\\nfn: mint(address,uint256)\\ntoken: WrappedToken", "arrows": "to"}, {"from": "User", "to": "User", "label": "transfer", "color": "#455a64", "title": "label: transfer\\nfn: transfer(address,uint256)\\ntoken: WrappedToken\\nguard: require(balanceOf[msg.sender] >= amount, \"WrappedToken: balance\")", "arrows": "to"}, {"from": "User", "to": "User", "label": "transfer", "color": "#455a64", "title": "label: transfer\\nfn: transferFrom(address,address,uint256)\\ntoken: WrappedToken\\nguard: require(allowance[from][msg.sender] >= amount, \"WrappedToken: allowance\") ; require(balanceOf[from] >= amount, \"WrappedToken: balance\")", "arrows": "to"}]);
 new vis.Network(document.getElementById('net'),{nodes,edges},{
   nodes:{shape:'box',font:{color:'#fff',size:14},margin:8,borderWidth:0},
   edges:{font:{size:12,align:'middle',background:'#fff'},smooth:{type:'cubicBezier'}},
   physics:{stabilization:true,barnesHut:{springLength:160}},
   layout:{improvedLayout:true}
 });
</script></body></html>
