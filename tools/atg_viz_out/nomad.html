<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><title>ATG — nomad</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
 body{font-family:system-ui,Segoe UI,Arial;margin:0;background:#fafafa}
 #hdr{padding:10px 16px;background:#263238;color:#fff}
 #hdr b{font-size:18px} #hdr span{opacity:.8;font-size:13px;margin-left:10px}
 #net{width:100vw;height:calc(100vh - 110px);border-top:1px solid #ccc}
 #legend{padding:6px 16px;font-size:12px;background:#eceff1}
 .chip{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;margin-right:6px}
</style></head><body>
<div id="hdr"><b>ATG — nomad</b>
 <span>6 nodes · 2 edges · 18 invariants — kéo để di chuyển, lăn chuột để zoom, rê chuột vào cạnh để xem guard</span></div>
<div id="legend">
 <span class="chip" style="background:#4f86c6">contract</span>
 <span class="chip" style="background:#e8a33d">user/eoa</span>
 <span class="chip" style="background:#7d5ba6">relay</span>
 <span class="chip" style="background:#3aa66f">token</span>
 <span class="chip" style="background:#2e7d32">lock/mint</span>
 <span class="chip" style="background:#b71c1c">withdraw/burn</span>
</div>
<div id="net"></div>
<script>
 const nodes=new vis.DataSet([{"id": "BridgeRouter", "label": "BridgeRouter", "group": "destination", "color": "#90a4ae", "title": "BridgeRouter\\ntype: router\\nchain: destination"}, {"id": "Replica", "label": "Replica", "group": "destination", "color": "#7d5ba6", "title": "Replica\\ntype: relay\\nchain: destination"}, {"id": "MockToken", "label": "MockToken", "group": "destination", "color": "#3aa66f", "title": "MockToken\\ntype: token\\nchain: destination"}, {"id": "User", "label": "User", "group": "destination", "color": "#90a4ae", "title": "User\\ntype: actor\\nchain: destination"}, {"id": "NomadMessage", "label": "NomadMessage", "group": "offchain", "color": "#90a4ae", "title": "NomadMessage\\ntype: library\\nchain: offchain"}, {"id": "ZeroAddress", "label": "ZeroAddress", "group": "source", "color": "#90a4ae", "title": "ZeroAddress\\ntype: address\\nchain: source"}]);
 const edges=new vis.DataSet([{"from": "BridgeRouter", "to": "User", "label": "mint", "color": "#1565c0", "title": "label: mint\\nfn: mint(address,uint256)\\ntoken: MockToken\\nguard: require(!consumedMessage[msgHash], \"already consumed\") ; require(ok, \"replica process failed\")", "arrows": "to"}, {"from": "ZeroAddress", "to": "User", "label": "mint", "color": "#1565c0", "title": "label: mint\\nfn: mint(address,uint256)\\ntoken: MockToken", "arrows": "to"}]);
 new vis.Network(document.getElementById('net'),{nodes,edges},{
   nodes:{shape:'box',font:{color:'#fff',size:14},margin:8,borderWidth:0},
   edges:{font:{size:12,align:'middle',background:'#fff'},smooth:{type:'cubicBezier'}},
   physics:{stabilization:true,barnesHut:{springLength:160}},
   layout:{improvedLayout:true}
 });
</script></body></html>
