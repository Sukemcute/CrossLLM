<!DOCTYPE html>
<html lang="vi"><head><meta charset="utf-8"><title>ATG — polynetwork</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
 body{font-family:system-ui,Segoe UI,Arial;margin:0;background:#fafafa}
 #hdr{padding:10px 16px;background:#263238;color:#fff}
 #hdr b{font-size:18px} #hdr span{opacity:.8;font-size:13px;margin-left:10px}
 #net{width:100vw;height:calc(100vh - 110px);border-top:1px solid #ccc}
 #legend{padding:6px 16px;font-size:12px;background:#eceff1}
 .chip{display:inline-block;padding:2px 8px;border-radius:10px;color:#fff;margin-right:6px}
</style></head><body>
<div id="hdr"><b>ATG — polynetwork</b>
 <span>5 nodes · 2 edges · 18 invariants — kéo để di chuyển, lăn chuột để zoom, rê chuột vào cạnh để xem guard</span></div>
<div id="legend">
 <span class="chip" style="background:#4f86c6">contract</span>
 <span class="chip" style="background:#e8a33d">user/eoa</span>
 <span class="chip" style="background:#7d5ba6">relay</span>
 <span class="chip" style="background:#3aa66f">token</span>
 <span class="chip" style="background:#2e7d32">lock/mint</span>
 <span class="chip" style="background:#b71c1c">withdraw/burn</span>
</div>
<div id="net"></div>
<script>
 const nodes=new vis.DataSet([{"id": "EthCrossChainData", "label": "EthCrossChainData", "group": "source", "color": "#4f86c6", "title": "EthCrossChainData\\ntype: contract\\nchain: source"}, {"id": "Manager", "label": "Manager", "group": "source", "color": "#4f86c6", "title": "Manager\\ntype: contract\\nchain: source"}, {"id": "EthCrossChainManager", "label": "EthCrossChainManager", "group": "source", "color": "#90a4ae", "title": "EthCrossChainManager\\ntype: router\\nchain: source"}, {"id": "TargetContract", "label": "TargetContract", "group": "source", "color": "#4f86c6", "title": "TargetContract\\ntype: contract\\nchain: source"}, {"id": "User", "label": "User", "group": "source", "color": "#90a4ae", "title": "User\\ntype: actor\\nchain: source"}]);
 const edges=new vis.DataSet([{"from": "EthCrossChainManager", "to": "TargetContract", "label": "call", "color": "#78909c", "title": "label: call\\nfn: verifyHeaderAndExecuteTx(address,bytes)", "arrows": "to"}, {"from": "EthCrossChainManager", "to": "User", "label": "withdraw", "color": "#b71c1c", "title": "label: withdraw\\nfn: signedWithdraw(address,uint256,uint256)\\ntoken: unknown\\nguard: require(!data.processed(nonce), \"EthCrossChainManager: replay\")", "arrows": "to"}]);
 new vis.Network(document.getElementById('net'),{nodes,edges},{
   nodes:{shape:'box',font:{color:'#fff',size:14},margin:8,borderWidth:0},
   edges:{font:{size:12,align:'middle',background:'#fff'},smooth:{type:'cubicBezier'}},
   physics:{stabilization:true,barnesHut:{springLength:160}},
   layout:{improvedLayout:true}
 });
</script></body></html>
